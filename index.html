<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCrafters Studio | Développement Android & Web au Maroc</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4F8EF7",
              "on-primary": "#FFFFFF",
              "secondary": "#8B5CF6",
              "background": "#FFFFFF",
              "on-background": "#0F172A",
              "surface": "#F8FAFC",
              "on-surface": "#1E293B",
              "surface-variant": "#F1F5F9",
              "on-surface-variant": "#64748B",
              "outline": "#CBD5E1",
              "outline-variant": "#E2E8F0",
              "primary-container": "#E0E7FF",
              "on-primary-container": "#1E1B4B",
              "secondary-container": "#F3E8FF",
              "on-secondary-container": "#2E1065",
              "tertiary": "#D97706",
              "on-tertiary": "#FFFFFF",
              "surface-container": "#F0F0F5",
              "surface-container-low": "#F7F7FC",
              "surface-container-high": "#EBEBED",
              "error": "#EF4444"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      .hero-gradient {
        background: linear-gradient(135deg, #4F8EF7, #8B5CF6);
      }
      .text-gradient {
        background: linear-gradient(135deg, #4F8EF7, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .blob {
        filter: blur(80px);
        opacity: 0.1;
        z-index: -1;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 40s linear infinite;
      }
      .gradient-border {
        position: relative;
        padding: 1px;
        background: linear-gradient(135deg, #4F8EF7, #8B5CF6);
      }

      /* ── Page transitions ──────────────────────────────────────────── */
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .page-enter {
        animation: pageIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      /* Stagger children */
      .page-enter > * { animation: pageIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
      .page-enter > *:nth-child(1) { animation-delay: 0ms; }
      .page-enter > *:nth-child(2) { animation-delay: 60ms; }
      .page-enter > *:nth-child(3) { animation-delay: 120ms; }
      .page-enter > *:nth-child(4) { animation-delay: 180ms; }
      .page-enter > *:nth-child(5) { animation-delay: 240ms; }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Image skeleton loading */
      .img-skeleton {
        background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
        background-size: 200% 100%;
        animation: skeleton 1.5s infinite;
      }
      @keyframes skeleton {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body class="bg-background text-on-background font-body selection:bg-primary/30 selection:text-primary overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
